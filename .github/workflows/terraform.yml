name: Terraform Pipeline

on:
  workflow_dispatch:
    inputs:
      workflow_action:
        description: "Operation to run"
        required: true
        type: choice
        default: "plan"
        options:
          - plan
          - apply
          - destroy
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '!**.md'
      - '!docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '!**.md'
      - '!docs/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    env:
      TF_VAR_service_account_key_file: key.json
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
      TF_INPUT: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x

      - name: Create key.json for Yandex Cloud provider
        run: |
          printf '%s\n' '${{ secrets.YC_SERVICE_ACCOUNT_KEY }}' > key.json

      - name: Terraform Init
        env:
          YC_ACCESS_KEY: ${{ secrets.YC_ACCESS_KEY }}
          YC_SECRET_KEY: ${{ secrets.YC_SECRET_KEY }}
        run: |
          terraform init -input=false \
            -backend-config="access_key=${YC_ACCESS_KEY}" \
            -backend-config="secret_key=${YC_SECRET_KEY}"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'plan')
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'apply')
        run: terraform apply -auto-approve -input=false -no-color
        working-directory: ./terraform

      # ─── НОВЫЕ ШАГИ ───────────────────────────────────────────

      - name: Install Yandex Cloud CLI
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'apply')
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Get kubeconfig
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'apply')
        run: |
          echo '${{ secrets.YC_SERVICE_ACCOUNT_KEY }}' > /tmp/sa-key.json
          $HOME/yandex-cloud/bin/yc config set service-account-key /tmp/sa-key.json
          $HOME/yandex-cloud/bin/yc config set cloud-id "${{ secrets.YC_CLOUD_ID }}"
          $HOME/yandex-cloud/bin/yc config set folder-id "${{ secrets.YC_FOLDER_ID }}"
          $HOME/yandex-cloud/bin/yc managed-kubernetes cluster get-credentials \
            app-nspc-cluster --external --force

      - name: Install Helm
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'apply')
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Deploy Monitoring (Grafana + Prometheus)
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'apply')
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            -f $GITHUB_WORKSPACE/helm/kube-prometheus-stack-values.yaml \
            --wait \
            --timeout 10m

      - name: Create imagePullSecret for YCR
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'apply')
        run: |
          kubectl create namespace app-nspc --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ycr-secret \
            --docker-server=cr.yandex \
            --docker-username=json_key \
            --docker-password='${{ secrets.YC_SERVICE_ACCOUNT_KEY }}' \
            --namespace=app-nspc \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy App manifests
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'apply')
        run: |
          kubectl apply -f https://raw.githubusercontent.com/AleksandrLipovetskiy/app-nspc/main/k8s/namespace.yaml
          kubectl apply -f https://raw.githubusercontent.com/AleksandrLipovetskiy/app-nspc/main/k8s/service.yaml
          kubectl apply -f https://raw.githubusercontent.com/AleksandrLipovetskiy/app-nspc/main/k8s/deployment.yaml

      - name: Get endpoints
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'apply')
        run: |
          echo "### Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "**App:**" >> $GITHUB_STEP_SUMMARY
          kubectl get svc app-nspc -n app-nspc >> $GITHUB_STEP_SUMMARY || true
          echo "**Grafana:**" >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n monitoring | grep grafana >> $GITHUB_STEP_SUMMARY || true
        echo "**Pods:**" >> $GITHUB_STEP_SUMMARY
        kubectl get pods -n app-nspc -o wide >> $GITHUB_STEP_SUMMARY || true
        kubectl describe pods -n app-nspc >> $GITHUB_STEP_SUMMARY || true

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sa-key.json    

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'destroy'
        run: terraform destroy -auto-approve -input=false

      - name: Cleanup sensitive files
        if: always()
        run: rm -f key.json tfplan
