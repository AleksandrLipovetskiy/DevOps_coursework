name: Terraform Pipeline

on:
  workflow_dispatch:
    inputs:
      workflow_action:
        description: "Operation to run"
        required: true
        type: choice
        default: "plan"
        options:
          - plan
          - apply
          - destroy
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '!**.md'
      - '!docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '!**.md'
      - '!docs/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VAR_service_account_key_file: ./key.json
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x

      - name: Create key.json for Yandex Cloud provider
        run: |
          mkdir -p ./terraform
          printf '%s\n' "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" > ./terraform/key.json

      - name: Terraform Init
        env:
          YC_ACCESS_KEY: ${{ secrets.YC_ACCESS_KEY }}
          YC_SECRET_KEY: ${{ secrets.YC_SECRET_KEY }}
        run: |
          terraform init \
            -backend-config="access_key=${YC_ACCESS_KEY}" \
            -backend-config="secret_key=${YC_SECRET_KEY}"
        working-directory: ./terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

      - name: Terraform Plan
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'plan')
        run: terraform plan -out=tfplan
        working-directory: ./terraform

      - name: Terraform Apply
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'apply')
        run: terraform apply -auto-approve
        working-directory: ./terraform

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_action == 'destroy'
        run: terraform destroy -auto-approve
        working-directory: ./terraform
